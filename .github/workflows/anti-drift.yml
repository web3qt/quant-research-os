name: anti-drift

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  pr-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML pytest
      - name: Deterministic anti-drift test gate
        run: |
          python -m pytest \
            tests/anti_drift/test_build_anti_drift_release_artifact.py \
            tests/anti_drift/test_build_anti_drift_gate_summary.py \
            tests/anti_drift/test_export_anti_drift_snapshots.py \
            tests/anti_drift/test_anti_drift_replay.py \
            tests/anti_drift/test_render_anti_drift_nightly_report.py \
            tests/anti_drift/test_anti_drift_baseline.py \
            tests/anti_drift/test_anti_drift.py \
            tests/session/test_run_research_session_script.py \
            tests/contracts/test_schema_loaders.py \
            tests/review/test_generation.py \
            tests/review/test_generated_skills_fresh.py
      - name: Generator freshness
        run: python runtime/scripts/gen_codex_stage_review_skills.py --dry-run
      - name: Snapshot baseline compare
        run: |
          python runtime/scripts/export_anti_drift_snapshots.py --output-dir /tmp/current_snapshots
          mkdir -p /tmp/blessed_snapshots
          cp tests/fixtures/anti_drift/*_snapshot.json /tmp/blessed_snapshots/
          python runtime/scripts/anti_drift_baseline.py compare --baseline /tmp/blessed_snapshots --current /tmp/current_snapshots > /tmp/anti_drift_compare.json
      - name: Nightly gate summary smoke
        run: |
          python runtime/scripts/build_anti_drift_gate_summary.py \
            --compare-json /tmp/anti_drift_compare.json \
            --report-path anti-drift-nightly.md \
            --freshness-ok true > /tmp/anti_drift_gate.json
          python runtime/scripts/build_anti_drift_release_artifact.py \
            --nightly-gate-json /tmp/anti_drift_gate.json \
            --generator-fresh true \
            --classification-baseline-matches true \
            --snapshot-cli-ok true > /tmp/anti_drift_release.json
      - uses: actions/upload-artifact@v4
        with:
          name: anti-drift-pr-artifacts
          path: |
            /tmp/current_snapshots
            /tmp/anti_drift_compare.json
            /tmp/anti_drift_gate.json
            /tmp/anti_drift_release.json

  nightly-release-gate:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML pytest
      - name: Anti-drift nightly pipeline
        run: |
          python runtime/scripts/gen_codex_stage_review_skills.py --dry-run
          python runtime/scripts/export_anti_drift_snapshots.py --output-dir /tmp/current_snapshots
          mkdir -p /tmp/blessed_snapshots
          cp tests/fixtures/anti_drift/*_snapshot.json /tmp/blessed_snapshots/
          python runtime/scripts/anti_drift_baseline.py compare --baseline /tmp/blessed_snapshots --current /tmp/current_snapshots > /tmp/anti_drift_compare.json
          python runtime/scripts/render_anti_drift_nightly_report.py --baseline /tmp/blessed_snapshots --current /tmp/current_snapshots --output /tmp/anti_drift_nightly.md
          python runtime/scripts/build_anti_drift_gate_summary.py \
            --compare-json /tmp/anti_drift_compare.json \
            --report-path /tmp/anti_drift_nightly.md \
            --freshness-ok true > /tmp/anti_drift_gate.json
          python runtime/scripts/run_research_session.py --outputs-root /tmp/qros_snapshot_verify --raw-idea "BTC leads high-liquidity alts after shock events" --snapshot > /tmp/qros_snapshot_verify.json
          python runtime/scripts/build_anti_drift_release_artifact.py \
            --nightly-gate-json /tmp/anti_drift_gate.json \
            --generator-fresh true \
            --classification-baseline-matches true \
            --snapshot-cli-ok true > /tmp/anti_drift_release.json
      - uses: actions/upload-artifact@v4
        with:
          name: anti-drift-nightly-artifacts
          path: |
            /tmp/current_snapshots
            /tmp/anti_drift_compare.json
            /tmp/anti_drift_nightly.md
            /tmp/anti_drift_gate.json
            /tmp/anti_drift_release.json
            /tmp/qros_snapshot_verify.json
