schema_id: tss-data-ready-artifacts-v1
schema_version: v1
stage: tss_data_ready
stage_dir: 02_tss_data_ready/author/formal
unknown_machine_top_level_fields: forbid

artifacts:
  time_index_manifest.json:
    type: json
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - tss_data_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: research_route
        description: 声明研究路线，用于确认该产物进入时序信号流程。
        type: enum
        values:
          - time_series_signal
      - path: primary_key
        description: 声明时序面板主键字段组合。
        type: list[string]
        allowed_values_if_nonempty:
          - asset
          - timestamp
      - path: asset_key
        description: 声明资产标识字段。
        type: string
      - path: timestamp_key
        description: 声明时间戳字段。
        type: string
      - path: bar_size
        description: 声明时序采样频率。
        type: string
      - path: timezone
        description: 声明时间戳时区语义。
        type: string
      - path: timestamp_semantics
        description: 声明时间戳可用性和 as-of 语义。
        type: string
      - path: horizons
        description: 列出当前数据底座支持的前瞻观察周期。
        type: list[string]
      - path: forward_return_fields
        description: 列出标签层未来收益字段；该字段只供后续证据阶段使用，不得进入信号输入。
        type: list[string]
      - path: feature_outputs
        description: 列出数据底座提供给信号阶段的 as-of 特征输出。
        type: list[string]

  asset_time_index.parquet:
    type: parquet
    required_columns:
      - asset
      - timestamp
      - is_tradable
      - forward_label_timestamp
    non_empty: true

  quality_flags.parquet:
    type: parquet
    required_columns:
      - asset
      - timestamp
      - quality_flag
    non_empty: true

  split_sample_adequacy_report.yaml:
    type: yaml
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - tss_data_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: research_route
        description: 声明研究路线，用于确认该产物进入时序信号流程。
        type: enum
        values:
          - time_series_signal
      - path: sample_unit
        description: 声明样本计数单位。
        type: enum
        values:
          - asset_timestamp
      - path: source_artifact
        description: 记录样本充足性检查使用的源产物。
        type: enum
        values:
          - asset_time_index.parquet
      - path: split_sample_counts
        description: 记录各切分窗口的样本数量。
        type: map
      - path: minimum_required
        description: 声明各切分窗口最低样本要求。
        type: map
      - path: adequacy
        description: 记录各切分窗口是否满足最低样本要求。
        type: map
      - path: final_verdict
        description: 声明该检查的最终结论。
        type: enum
        values:
          - PASS
          - FAIL

  run_manifest.json:
    type: json
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - tss_data_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: research_route
        description: 声明研究路线，用于确认该产物进入时序信号流程。
        type: enum
        values:
          - time_series_signal
      - path: source_stage
        description: 记录该产物承接的上游阶段。
        type: enum
        values:
          - mandate
      - path: primary_key
        description: 声明时序面板主键字段组合。
        type: list[string]
        allowed_values_if_nonempty:
          - asset
          - timestamp
      - path: machine_artifacts
        description: 列出机器可读产物路径。
        type: list[string]
      - path: consumer_stage
        description: 声明该产物交付给哪个下游阶段使用。
        type: enum
        values:
          - tss_signal_ready
      - path: replay_command
        description: 记录复现命令。
        type: string

  rebuild_tss_data_ready.py:
    type: script
