schema_id: csf-data-ready-artifacts-v1
schema_version: v1
stage: csf_data_ready
stage_dir: 02_csf_data_ready/author/formal
unknown_machine_top_level_fields: forbid

artifacts:
  panel_manifest.json:
    type: json
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - csf_data_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: panel_primary_key
        description: 声明面板主键字段组合，用于唯一定位横截面样本。
        type: list[string]
      - path: cross_section_time_key
        description: 声明横截面时间键，用于按时点切分和聚合资产样本。
        type: string
      - path: asset_key
        description: 声明资产标识字段，用于连接收益、流动性、因子和组合数据。
        type: string
      - path: shared_feature_outputs
        description: 列出共享特征输出，用于声明下游可复用的数据产物。
        type: list[string]
      - path: machine_artifacts
        description: 列出机器可读产物路径，用于 review 和下游阶段读取。
        type: list[string]
      - path: coverage_floor_min_ratio
        description: 声明最低覆盖率阈值，用于判定面板数据是否足够完整。
        type: number

  asset_universe_membership.parquet:
    type: parquet
    required_columns:
      - date
      - asset
      - in_universe
    non_empty: true

  cross_section_coverage.parquet:
    type: parquet
    required_columns:
      - date
      - coverage_ratio
      - asset_count
    non_empty: true

  split_sample_adequacy_report.yaml:
    type: yaml
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - csf_data_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: sample_unit
        description: 声明样本计数单位，用于解释 train test backtest holdout 的数量口径。
        type: enum
        values:
          - cross_section_snapshot
      - path: source_artifact
        description: 记录样本充足性检查使用的源产物。
        type: enum
        values:
          - cross_section_coverage.parquet
      - path: split_source_artifact
        description: 记录时间切分定义来源，用于审计样本窗口与 mandate 的一致性。
        type: string
      - path: split_sample_counts
        description: 记录各切分窗口的样本数量，用于判断样本是否达标。
        type: map
      - path: minimum_required
        description: 声明各切分窗口最低样本要求，用于样本充足性 gate。
        type: map
      - path: adequacy
        description: 记录各切分窗口是否满足最低样本要求。
        type: map
      - path: final_verdict
        description: 声明该检查的最终结论，用于决定阶段能否进入 review。
        type: enum
        values:
          - PASS
          - FAIL

  eligibility_base_mask.parquet:
    type: parquet
    required_columns:
      - date
      - asset
      - eligible
    non_empty: true

  shared_feature_base:
    type: directory
    required_files:
      - path: returns_panel.parquet
        description: 声明收益面板文件要求，用于后续因子标签、回测和诊断。
        type: parquet
        required_columns:
          - date
          - asset
          - return_1d
        non_empty: true
      - path: liquidity_panel.parquet
        description: 声明流动性面板文件要求，用于可交易性和容量约束。
        type: parquet
        required_columns:
          - date
          - asset
          - dollar_volume
        non_empty: true
      - path: beta_inputs.parquet
        description: 声明 beta 输入面板文件要求，用于市场中性或 beta 残差化。
        type: parquet
        required_columns:
          - date
          - asset
          - beta_proxy
        non_empty: true

  asset_taxonomy_snapshot.parquet:
    type: parquet
    required_columns:
      - asset
      - date
      - group_taxonomy_reference
      - group_bucket
    non_empty: true

  csf_data_contract.md:
    type: markdown
    required_sections:
      - CSF 数据合同

  csf_data_ready_gate_decision.md:
    type: markdown
    required_sections:
      - CSF Data Ready Gate Decision

  run_manifest.json:
    type: json
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - csf_data_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: source_stage
        description: 记录该产物承接的上游阶段，用于审计阶段输入来源。
        type: enum
        values:
          - mandate
      - path: panel_primary_key
        description: 声明面板主键字段组合，用于唯一定位横截面样本。
        type: list[string]
      - path: cross_section_time_key
        description: 声明横截面时间键，用于按时点切分和聚合资产样本。
        type: string
      - path: asset_key
        description: 声明资产标识字段，用于连接收益、流动性、因子和组合数据。
        type: string
      - path: universe_membership_rule
        description: 声明样本进入标的池的规则，用于固定横截面覆盖口径。
        type: string
      - path: group_taxonomy_reference
        description: 记录分组分类体系引用，用于分组中性、组内排序或分组诊断。
        type: string
      - path: eligibility_base_rule
        description: 声明基础可交易资格规则，用于过滤不可用资产样本。
        type: string
      - path: coverage_floor_rule
        description: 声明覆盖率底线规则，用于决定数据缺失时是否可继续。
        type: string
      - path: shared_feature_outputs
        description: 列出共享特征输出，用于声明下游可复用的数据产物。
        type: list[string]
      - path: machine_artifacts
        description: 列出机器可读产物路径，用于 review 和下游阶段读取。
        type: list[string]
      - path: consumer_stage
        description: 声明该产物交付给哪个下游阶段使用。
        type: enum
        values:
          - csf_signal_ready
      - path: frozen_inputs_note
        description: 记录已冻结输入说明，用于复核本阶段没有隐式变更上游合同。
        type: string
      - path: runtime_root_hint
        description: 记录 runtime 根目录提示，用于复现执行环境定位。
        type: string
      - path: runtime_module
        description: 记录 runtime 模块名，用于定位可复现构建函数。
        type: string
      - path: runtime_function
        description: 记录 runtime 函数名，用于定位实际执行入口。
        type: string
      - path: source_git_revision
        description: 记录源码 git revision，用于绑定产物与生成代码版本。
        type: string
      - path: program_artifacts
        description: 列出阶段程序产物，用于证明机器产物由真实程序生成。
        type: list[string]
      - path: replay_working_directory
        description: 记录复现工作目录，用于重新运行生成命令。
        type: string
      - path: replay_command
        description: 记录复现命令，用于审计和重放阶段执行。
        type: string
      - path: source_data_provenance
        description: 绑定本阶段真实读取的数据摘要、行数、时间范围和样本规模，防止合成面板伪装成正式结果。
        type: map

  rebuild_csf_data_ready.py:
    type: script

  artifact_catalog.md:
    type: markdown
    required_sections:
      - 产物清单

  field_dictionary.md:
    type: markdown
    required_sections:
      - 字段字典
