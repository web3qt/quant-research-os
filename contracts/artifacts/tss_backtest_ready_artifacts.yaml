schema_id: tss-backtest-ready-artifacts-v1
schema_version: v1
stage: tss_backtest_ready
stage_dir: 06_tss_backtest_ready/author/formal
unknown_machine_top_level_fields: forbid

artifacts:
  strategy_contract.yaml:
    type: yaml
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - tss_backtest_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: research_route
        description: 声明研究路线，用于确认该产物进入时序信号流程。
        type: enum
        values:
          - time_series_signal
      - path: primary_key
        description: 声明回测时序主键字段组合。
        type: list[string]
        allowed_values_if_nonempty:
          - timestamp
          - strategy_id
      - path: strategy_id
        description: 标识当前回测策略。
        type: string
      - path: variant_id
        description: 标识当前策略绑定的测试入选 variant。
        type: string
      - path: entry_rule
        description: 声明入场规则。
        type: string
      - path: exit_rule
        description: 声明出场规则。
        type: string
      - path: net_after_cost_rule
        description: 声明成本后收益判定规则。
        type: string
      - path: execution_lag_rule
        description: 声明执行滞后规则。
        type: string
      - path: cost_model
        description: 声明交易成本模型。
        type: string
      - path: risk_limit_rule
        description: 声明风险限制规则。
        type: string
      - path: delivery_contract.machine_artifacts
        description: 声明交付给下游的机器产物。
        type: list[string]
      - path: delivery_contract.consumer_stage
        description: 声明交付产物的消费阶段。
        type: enum
        values:
          - tss_holdout_validation

  engine_compare.csv:
    type: csv
    required_columns:
      - strategy_id
      - engine_name
      - metric_name
      - metric_value
    non_empty: true

  position_timeseries.parquet:
    type: parquet
    required_columns:
      - timestamp
      - strategy_id
      - asset
      - position
    non_empty: true

  trade_ledger.csv:
    type: csv
    required_columns:
      - timestamp
      - strategy_id
      - asset
      - quantity
      - price
    non_empty: true

  tss_backtest_gate_table.csv:
    type: csv
    required_columns:
      - timestamp
      - strategy_id
      - verdict
      - reason
    non_empty: true

  run_manifest.json:
    type: json
    unknown_top_level_fields: forbid
    fields:
      - path: stage
        description: 标识该 artifact 所属的 QROS 阶段，用于阻止跨阶段产物混用。
        type: enum
        values:
          - tss_backtest_ready
      - path: lineage_id
        description: 标识当前研究 lineage，用于把产物绑定到唯一研究线。
        type: string
      - path: research_route
        description: 声明研究路线，用于确认该产物进入时序信号流程。
        type: enum
        values:
          - time_series_signal
      - path: source_stage
        description: 记录该产物承接的上游阶段。
        type: enum
        values:
          - tss_test_evidence
      - path: primary_key
        description: 声明回测时序主键字段组合。
        type: list[string]
        allowed_values_if_nonempty:
          - timestamp
          - strategy_id
      - path: machine_artifacts
        description: 列出机器可读产物路径。
        type: list[string]
      - path: consumer_stage
        description: 声明该产物交付给哪个下游阶段使用。
        type: enum
        values:
          - tss_holdout_validation
      - path: replay_command
        description: 记录复现命令。
        type: string
