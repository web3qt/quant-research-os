version: "1.0"
schema_id: "idea-qualification-scorecard-v1"
title: "Idea Qualification Scorecard Schema"
purpose: >
  用统一、machine-readable 的方式判断一个 idea 是否值得升级到 mandate。

score_range:
  min: 1
  max: 5

required_dimensions:
  - observability
  - mechanism_plausibility
  - tradeability
  - data_feasibility
  - scoping_clarity
  - distinctiveness

dimension_schema:
  required_fields:
    - score
    - evidence
    - uncertainty
    - kill_reason
  score_meaning:
    1: "严重不足，通常应停止"
    2: "较弱，需要大幅重构"
    3: "可研究，但仍需收敛边界"
    4: "较强，适合进入正式 qualification 结论"
    5: "非常强，可直接支持升格到 mandate"

example:
  idea_id: "btc_led_alt_transmission_v1"
  reviewer_identity: "codex"
  summary: "验证 BTC 冲击是否会向高流动性 ALT 产生短周期传导"
  dimensions:
    observability:
      score: 4
      evidence:
        - "可定义 btc_shock_size"
        - "可定义 alt_future_relative_return"
      uncertainty:
        - "事件阈值仍需正式化"
      kill_reason:
        - "如果观测变量无法稳定定义，则停止"
    mechanism_plausibility:
      score: 4
      evidence:
        - "BTC 价格发现主导假设"
      uncertainty:
        - "需排除共同 beta 解释"
      kill_reason:
        - "若只有同步相关无滞后机制，则停止"
    tradeability:
      score: 3
      evidence:
        - "存在 15m-60m 潜在滞后窗口"
      uncertainty:
        - "成本后空间未知"
      kill_reason:
        - "若效应规模明显低于成本，则停止"
    data_feasibility:
      score: 4
      evidence:
        - "Binance perp 数据可得"
      uncertainty:
        - "需确认统一时间栅格"
      kill_reason:
        - "若数据版本不稳定，则停止"
    scoping_clarity:
      score: 4
      evidence:
        - "可限定为 high-liquidity top alts / 5m / 15m-60m"
      uncertainty:
        - "是否先做 direction 还是 relative return"
      kill_reason:
        - "若范围无法收窄，则停止"
    distinctiveness:
      score: 3
      evidence:
        - "相对简单 beta 叙事仍需去重"
      uncertainty:
        - "可能与市场 beta / lead-lag 研究重合"
      kill_reason:
        - "若只是常见 beta 换壳，则停止"
