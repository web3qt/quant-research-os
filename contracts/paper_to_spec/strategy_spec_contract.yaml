schema_id: qros-paper-to-spec-contract-v1
spec_version: v1
required_top_level_fields:
  - spec_version
  - strategy_identity
  - paper_stated
  - agent_inferred
  - implementation_handoff
required_strategy_identity_fields:
  - title
  - summary
  - strategy_type
allowed_source_kinds:
  - pdf_url
  - webpage
  - local_pdf
  - local_doc
  - text_summary
allowed_strategy_types:
  - cross_sectional_factor
  - time_series_signal
  - event_driven
  - execution_rule
required_paper_stated_fields:
  - strategy_claim
  - market_scope
  - universe_rule
  - data_requirements
  - feature_definition
  - label_or_target
  - portfolio_construction
  - risk_controls
  - cost_model
  - evaluation_protocol
paper_stated_list_fields:
  - data_requirements
  - risk_controls
required_agent_inferred_fields:
  - inference_log
  - implementation_choices
  - default_assumptions
  - ambiguities
  - fallback_plan
agent_inferred_list_fields:
  - inference_log
  - ambiguities
required_ambiguity_fields:
  - id
  - severity
  - question
allowed_ambiguity_severities:
  - best_effort
  - blocking_for_auto_implement
required_implementation_handoff_fields:
  - required_modules
  - expected_inputs
  - expected_outputs
  - validation_targets
implementation_handoff_list_fields:
  - required_modules
  - expected_inputs
  - expected_outputs
  - validation_targets
