data_readiness_brief:
  required_datasets:
    - name: price_bars
      requirement: OHLCV bars for crypto perpetual contracts
      required: true
      market_scope:
        market_type: crypto_perpetual
        exchange_profile: binance_usdt_perp
      symbol_universe:
        selection: top_n_by_volume
        symbols:
          - BTCUSDT
          - ETHUSDT
      fields:
        - timestamp
        - symbol
        - open
        - high
        - low
        - close
        - volume
      cadence: 1h
      time_range:
        start: "2023-01-01T00:00:00Z"
        end: "2025-12-31T23:00:00Z"
      source_constraints:
        venue: Binance USDT perpetual
        price_type: mark
      expected_format: parquet
      provenance_requirements:
        - source
        - command
        - snapshot_identity
        - coverage
      missing_data_policy: fail_if_required_bars_missing
      blocking: false
    - name: funding_rates
      requirement: Funding rates for perpetual return accounting
      required: true
      market_scope:
        market_type: crypto_perpetual
        exchange_profile: binance_usdt_perp
      symbol_universe:
        selection: match_price_bars
        symbols:
          - BTCUSDT
          - ETHUSDT
      fields:
        - timestamp
        - symbol
        - funding_rate
      cadence: 8h
      time_range:
        start: "2023-01-01T00:00:00Z"
        end: "2025-12-31T23:00:00Z"
      source_constraints:
        venue: Binance USDT perpetual
      expected_format: parquet
      provenance_requirements:
        - source
        - command
        - snapshot_identity
        - coverage
      missing_data_policy: fail_if_required_funding_missing
      blocking: false
  optional_datasets: []
  blocking_gaps: []
  summary: Required price bars and funding data are identified before implementation.
