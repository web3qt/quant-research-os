version: "1.0"
schema_id: "research-route-v1"
title: "Research Route Schema"
purpose: >
  记录 mandate 阶段冻结的研究路线真值，用于后续 stage contract 分流。

allowed_routes:
  - time_series_signal
  - cross_sectional_factor

required_fields:
  - research_route
  - excluded_routes
  - route_rationale
  - route_change_policy
  - route_contract_version

field_rules:
  research_route:
    type: string
    allowed_values:
      - time_series_signal
      - cross_sectional_factor
  excluded_routes:
    type: array
    min_items: 1
    allowed_values:
      - time_series_signal
      - cross_sectional_factor
  route_rationale:
    type: array
    min_items: 1
  route_change_policy:
    type: object
    required:
      - before_downstream_freeze
      - after_downstream_freeze
  route_contract_version:
    type: string

example:
  research_route: "cross_sectional_factor"
  excluded_routes:
    - "time_series_signal"
  route_rationale:
    - "问题本质是横截面排序，而不是单资产时间序列预测"
    - "下游证据应该优先看 Rank IC 和分组收益"
  route_change_policy:
    before_downstream_freeze: "rollback_to_mandate"
    after_downstream_freeze: "child_lineage"
  route_contract_version: "v1"
