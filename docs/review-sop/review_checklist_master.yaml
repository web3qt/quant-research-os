
version: "1.0"
doc_id: "SOP-REVIEW-CHECKLIST-MASTER-v1.0"
title: "Review Checklist Master — 阶段审查总检查表"
date: "2026-03-23"
timezone: "Asia/Tokyo"
status: "Active"
owner:
  - "Strategy Research"
  - "Quant Dev"
  - "Reviewer"
  - "Referee"
depends_on:
  - "docs/all-sops/第一层-主流程sop/research_workflow_sop.md"
  - "docs/all-sops/workflow_stage_gates.yaml"
  - "stage_completion_standard_cn.md"
  - "lineage_change_control_sop_cn.md"

meta:
  purpose: >
    为所有正式研究阶段提供统一、machine-readable 的 reviewer 检查表。
    该文件不替代 docs/all-sops/workflow_stage_gates.yaml 的 formal contract，而是把“如何审查阶段是否可信完成”
    标准化，供人工 reviewer、agent reviewer、CI 检查脚本和 gate 工具统一消费。
  usage_order:
    - "先识别当前 stage"
    - "读取 docs/all-sops/workflow_stage_gates.yaml 中该 stage 的 formal contract"
    - "核对 required_inputs / required_outputs / formal_gate / verdict_rules / rollback_rules"
    - "再读取本文件对应 stage 的 review checklist"
    - "先判断 blocking issues，再判断 reservations"
    - "最后输出统一 verdict 与 rollback_stage / allowed_modifications / downstream_permissions"
    - "将 reviewer findings 汇总进 latest_review_pack.yaml，并写出 stage_completion_certificate.yaml"
  closure_artifacts:
    review_pack: "latest_review_pack.yaml 是 reviewer findings 的聚合件"
    independent_review_proof: "stage_gate_review.yaml 只证明独立 reviewer agent review 已发生"
    completion_certificate: "stage_completion_certificate.yaml 是 machine-readable closure certificate"
  severity_levels:
    blocking: "任一 blocking 项未通过，默认不得写 PASS；通常只能写 RETRY / PASS FOR RETRY / NO-GO / CHILD LINEAGE"
    reservation: "不阻断阶段关闭，但必须进入 residual_risks 或 reservations；若较多，则只能写 CONDITIONAL PASS"
    info: "记录性检查，不直接影响 formal gate，但必须归档"

global_checks:
  - id: "GLOBAL-001"
    title: "formal contract referenced"
    severity: "blocking"
    check: "当前 stage 的 docs/all-sops/workflow_stage_gates.yaml contract 已被明确引用"
    evidence:
      - "stage gate 文档"
      - "review notes"
  - id: "GLOBAL-002"
    title: "artifact catalog present"
    severity: "blocking"
    check: "本阶段存在 artifact_catalog.md，且登记了关键机器可读产物"
    evidence:
      - "artifact_catalog.md"
  - id: "GLOBAL-003"
    title: "field documentation present"
    severity: "blocking"
    check: "本阶段存在 field_dictionary.md 或 *_fields.md，并可追到关键字段"
    evidence:
      - "field_dictionary.md"
      - "*_fields.md"
  - id: "GLOBAL-004"
    title: "run manifest present"
    severity: "blocking"
    check: "本阶段存在 run_manifest.json 或等价执行账本"
    evidence:
      - "run_manifest.json"
      - "repro_manifest.json"
  - id: "GLOBAL-005"
    title: "gate decision present"
    severity: "blocking"
    check: "本阶段存在正式 gate 决策文档，并与 stage_completion_certificate.yaml 一起写清 stage_status / rollback_stage / allowed_modifications / next_stage"
    evidence:
      - "gate_decision.yaml"
      - "stage_completion_certificate.yaml"
      - "stage_gate_review.yaml"
  - id: "GLOBAL-006"
    title: "freeze audit performed"
    severity: "blocking"
    check: "审查人已确认当前阶段消费的是上游冻结对象，而不是临时重算或静默替换对象"
    evidence:
      - "review notes"
      - "frozen_spec.json"
  - id: "GLOBAL-007"
    title: "negative results retained"
    severity: "reservation"
    check: "失败对象、reject ledger、retry record 或失败结论被保留"
    evidence:
      - "reject ledger"
      - "retry record"
      - "failure summary"
  - id: "GLOBAL-008"
    title: "effective challenge documented"
    severity: "blocking"
    check: "存在 reviewer/self-challenge 记录，说明主要怀疑点、排查过程与残留风险"
    evidence:
      - "review_notes.md"
      - "self_challenge.md"

stages:
  mandate:
    stage_name: "Mandate"
    recommended_gate_doc: "mandate.md"
    checks:
      - id: "MANDATE-001"
        severity: "blocking"
        check: "研究主问题已冻结，且明确写清不研究什么"
        evidence:
          - "mandate.md"
      - id: "MANDATE-002"
        severity: "blocking"
        check: "正式时间窗与 Train/Test/Backtest/Holdout 切分已冻结"
        evidence:
          - "time_split.json"
          - "mandate.md"
      - id: "MANDATE-003"
        severity: "blocking"
        check: "Universe、准入口径、主副腿角色已冻结"
        evidence:
          - "research_scope.md"
          - "mandate.md"
      - id: "MANDATE-004"
        severity: "blocking"
        check: "字段分层已写清，且关键字段具有人类可读解释"
        evidence:
          - "mandate.md"
          - "field_dictionary.md"
      - id: "MANDATE-005"
        severity: "blocking"
        check: "信号表达式模板、时间语义和无前视约定已写清"
        evidence:
          - "mandate.md"
      - id: "MANDATE-006"
        severity: "blocking"
        check: "参数字典、参数候选集、参数约束已写清"
        evidence:
          - "parameter_grid.yaml"
          - "mandate.md"
      - id: "MANDATE-007"
        severity: "reservation"
        check: "实现栈、并行计划、非 Rust 例外说明已记录"
        evidence:
          - "run_config.toml"
          - "mandate.md"
      - id: "MANDATE-008"
        severity: "blocking"
        check: "若关键字段或参数仅列名称未解释，则不得通过"
        evidence:
          - "mandate.md"

  data_ready:
    stage_name: "Data Ready"
    recommended_gate_doc: "data_ready_gate_decision.md"
    checks:
      - id: "DATA-001"
        severity: "blocking"
        check: "dense 时间轴已生成，目标对象时间栅格一致"
        evidence:
          - "aligned_bars/"
          - "data_contract.md"
      - id: "DATA-002"
        severity: "blocking"
        check: "缺失、stale、outlier、坏价等语义被显式标记，而非静默修复"
        evidence:
          - "qc_report.parquet"
          - "field_dictionary.md"
      - id: "DATA-003"
        severity: "blocking"
        check: "基准腿（如 BTC）覆盖审计通过"
        evidence:
          - "qc_report.parquet"
          - "universe_summary.md"
      - id: "DATA-004"
        severity: "blocking"
        check: "dataset_manifest.json 已冻结当前数据版本、Universe 版本和产物路径"
        evidence:
          - "dataset_manifest.json"
      - id: "DATA-005"
        severity: "blocking"
        check: "去重规则与时间主键口径明确，未混用 open_time / close_time"
        evidence:
          - "dedupe_rule.md"
          - "data_contract.md"
      - id: "DATA-006"
        severity: "blocking"
        check: "Universe 排除项已显式记录，并给出原因"
        evidence:
          - "universe_exclusions.*"
          - "universe_summary.md"
      - id: "DATA-007"
        severity: "reservation"
        check: "rolling_stats 或等价可复用 rolling 缓存已生成"
        evidence:
          - "rolling_stats/"

  signal_ready:
    stage_name: "Signal Ready"
    recommended_gate_doc: "signal_gate_decision.md"
    checks:
      - id: "SIGNAL-001"
        severity: "blocking"
        check: "信号字段合同已生成，字段 schema 固定"
        evidence:
          - "signal_fields_contract.md"
      - id: "SIGNAL-002"
        severity: "blocking"
        check: "param_id 身份已显式落地，并存在 param manifest"
        evidence:
          - "param_manifest.csv"
      - id: "SIGNAL-003"
        severity: "blocking"
        check: "timeseries 已落盘，且下游无需临时重算同名信号"
        evidence:
          - "timeseries/"
      - id: "SIGNAL-004"
        severity: "blocking"
        check: "当前阶段引用了上游 Mandate 的表达式模板，而未静默改写机制"
        evidence:
          - "signal_fields_contract.md"
          - "review notes"
      - id: "SIGNAL-005"
        severity: "blocking"
        check: "未越权做白名单结论、收益结论或 test/backtest 级别结论"
        evidence:
          - "signal_gate_decision.md"
      - id: "SIGNAL-006"
        severity: "reservation"
        check: "coverage / low_sample / pair_missing 等最小质量保留项已审计"
        evidence:
          - "signal_coverage.*"
          - "symbol_summary.parquet"
      - id: "SIGNAL-007"
        severity: "blocking"
        check: "Train 阶段只能消费已在本阶段显式物化过的 param_id"
        evidence:
          - "param_manifest.csv"
          - "signal_gate_decision.md"

  train_calibration:
    stage_name: "Train Calibration"
    recommended_gate_doc: "train_gate_decision.md"
    checks:
      - id: "TRAIN-001"
        severity: "blocking"
        check: "训练阈值、分位尺子、regime 切点已冻结"
        evidence:
          - "train_thresholds.*"
      - id: "TRAIN-002"
        severity: "blocking"
        check: "训练质量过滤已冻结，且未把 test/backtest 信息带入"
        evidence:
          - "train_quality.*"
          - "review notes"
      - id: "TRAIN-003"
        severity: "blocking"
        check: "完整参数 ledger 已保存"
        evidence:
          - "train_param_ledger.csv"
      - id: "TRAIN-004"
        severity: "blocking"
        check: "reject ledger 已保存，并可解释拒绝原因"
        evidence:
          - "train_rejects.csv"
      - id: "TRAIN-005"
        severity: "blocking"
        check: "没有用训练收益最大化直接选最终策略"
        evidence:
          - "train_gate_decision.md"
          - "review notes"
      - id: "TRAIN-006"
        severity: "blocking"
        check: "未根据 test/backtest 结果回写 train freeze"
        evidence:
          - "review notes"
      - id: "TRAIN-007"
        severity: "reservation"
        check: "若参数粗筛发生，理由仅限排除荒谬区间，而非后验收益优化"
        evidence:
          - "train_param_ledger.csv"
          - "train_gate_decision.md"

  test_evidence:
    stage_name: "Test Evidence"
    recommended_gate_doc: "test_gate_decision.md"
    checks:
      - id: "TEST-001"
        severity: "blocking"
        check: "Test 使用的阈值完全来自 Train 冻结对象"
        evidence:
          - "frozen_spec.json"
          - "test_gate_decision.md"
      - id: "TEST-002"
        severity: "blocking"
        check: "formal gate 与 audit-only 已分开记录"
        evidence:
          - "test_gate_decision.md"
          - "test_gate_table.csv"
      - id: "TEST-003"
        severity: "blocking"
        check: "统计证据在独立样本上计算，未在 test 重估训练尺子"
        evidence:
          - "report_by_h.parquet"
          - "review notes"
      - id: "TEST-004"
        severity: "blocking"
        check: "白名单、best_h 或后续候选集已冻结"
        evidence:
          - "selected_symbols_test.*"
          - "symbol_summary.parquet"
          - "frozen_spec.json"
      - id: "TEST-005"
        severity: "blocking"
        check: "未看了 Backtest 再回写 Test 白名单"
        evidence:
          - "review notes"
      - id: "TEST-006"
        severity: "blocking"
        check: "若 formal gate 引用了 t 值、p 值、回归显著性或残差型证据，已写明稳健推断口径或免做理由"
        evidence:
          - "test_gate_decision.md"
          - "review notes"
      - id: "TEST-007"
        severity: "blocking"
        check: "若 formal gate 依赖残差近似独立、原始 OLS 误差设定，或用“未见明显 serial correlation”支撑结论，已记录自相关诊断 protocol 或免做理由"
        evidence:
          - "test_gate_decision.md"
          - "review notes"
      - id: "TEST-008"
        severity: "blocking"
        check: "若 formal gate 依赖多变量回归里单个系数的符号、显著性或增量解释，已记录多重共线性诊断 protocol 或免做理由"
        evidence:
          - "test_gate_decision.md"
          - "review notes"
      - id: "TEST-009"
        severity: "blocking"
        check: "若 formal gate 把跨窗口关系连续性、回归系数稳定性或 lead-lag 结构延续作为通过依据，已记录结构突变检验 protocol 或免做理由"
        evidence:
          - "test_gate_decision.md"
          - "review notes"
      - id: "TEST-010"
        severity: "reservation"
        check: "若有条件分层分析，其定位为 audit evidence 或已明确冻结为正式 gate"
        evidence:
          - "condition_bucket_summary.csv"
          - "report_by_h_with_conditions.*"
          - "test_gate_decision.md"
      - id: "TEST-011"
        severity: "reservation"
        check: "若做了自相关诊断，已说明 Durbin-Watson、Breusch-Godfrey LM、Ljung-Box 或同类方法的适用边界与结论"
        evidence:
          - "test_gate_decision.md"
          - "review notes"
      - id: "TEST-012"
        severity: "reservation"
        check: "若做了多重共线性诊断，已说明 VIF、condition number 或同类方法的适用边界与结论"
        evidence:
          - "test_gate_decision.md"
          - "review notes"
      - id: "TEST-013"
        severity: "reservation"
        check: "若做了结构突变或参数稳定性审计，已区分 regime mismatch、样本问题与机制失效"
        evidence:
          - "test_gate_decision.md"
          - "review notes"

  backtest_ready:
    stage_name: "Backtest Ready"
    recommended_gate_doc: "backtest_gate_decision.md"
    checks:
      - id: "BACKTEST-001"
        severity: "blocking"
        check: "输入白名单和交易规则来自上游冻结文件"
        evidence:
          - "frozen_spec.json"
          - "backtest_frozen_config.json"
      - id: "BACKTEST-002"
        severity: "blocking"
        check: "vectorbt 与 backtrader 两套正式回测均已完成"
        evidence:
          - "vectorbt/"
          - "backtrader/"
      - id: "BACKTEST-003"
        severity: "blocking"
        check: "双引擎关键结果一致，semantic_gap = false"
        evidence:
          - "engine_compare.csv"
      - id: "BACKTEST-004"
        severity: "blocking"
        check: "收益、回撤和资金曲线基于正式资金记账口径"
        evidence:
          - "portfolio_summary.parquet"
          - "summary.txt"
          - "field_dictionary.md"
      - id: "BACKTEST-005"
        severity: "blocking"
        check: "未在 backtest 中重新选币或重估 best_h"
        evidence:
          - "review notes"
          - "backtest_gate_decision.md"
      - id: "BACKTEST-006"
        severity: "blocking"
        check: "若收益异常高，abnormal performance sanity check 已完成"
        evidence:
          - "backtest_gate_decision.md"
          - "review notes"
      - id: "BACKTEST-007"
        severity: "reservation"
        check: "若搜索多套策略组合，combo ledger 与预算纪律完整"
        evidence:
          - "strategy_combo_ledger.csv"
          - "selected_strategy_combo.json"
      - id: "BACKTEST-008"
        severity: "reservation"
        check: "gross / net / fee / turnover / close reason 已拆解解释"
        evidence:
          - "portfolio_summary.parquet"
          - "symbol_metrics.parquet"
          - "trades.parquet"

  holdout_validation:
    stage_name: "Holdout Validation"
    recommended_gate_doc: "holdout_gate_decision.md"
    checks:
      - id: "HOLDOUT-001"
        severity: "blocking"
        check: "Holdout 使用的规则未再修改，且完全来自 Backtest 冻结方案"
        evidence:
          - "holdout_run_manifest.json"
          - "frozen_spec.json"
      - id: "HOLDOUT-002"
        severity: "blocking"
        check: "单窗口和合并窗口结果均已落地"
        evidence:
          - "portfolio_summary.parquet"
          - "trades.parquet"
          - "holdout_backtest_compare.csv"
      - id: "HOLDOUT-003"
        severity: "blocking"
        check: "未用 holdout 调任何参数、白名单或规则"
        evidence:
          - "review notes"
      - id: "HOLDOUT-004"
        severity: "blocking"
        check: "已解释无交易、低样本或低触发是否属于正常现象"
        evidence:
          - "holdout_gate_decision.md"
      - id: "HOLDOUT-005"
        severity: "blocking"
        check: "若 verdict 依赖结构连续性或用 regime mismatch 解释退化，已记录结构突变检验 protocol 或免做理由"
        evidence:
          - "holdout_gate_decision.md"
          - "review notes"
      - id: "HOLDOUT-006"
        severity: "reservation"
        check: "已检查 holdout 是否暴露孤峰参数、selection bias、断崖退化或显著结构突变"
        evidence:
          - "holdout_backtest_compare.csv"
          - "review notes"
      - id: "HOLDOUT-007"
        severity: "reservation"
        check: "若检出显著结构突变，已说明其更接近 regime mismatch、样本问题还是机制断裂"
        evidence:
          - "holdout_gate_decision.md"
          - "review notes"

  promotion_decision:
    stage_name: "Promotion Decision"
    recommended_gate_doc: "final_research_conclusion.md"
    checks:
      - id: "PROMOTION-001"
        severity: "blocking"
        check: "已形成正式结论，不是口头判断"
        evidence:
          - "final_research_conclusion.md"
      - id: "PROMOTION-002"
        severity: "blocking"
        check: "retry / rollback / no-go / child lineage 理由已记录"
        evidence:
          - "retry_record.*"
          - "final_research_conclusion.md"
      - id: "PROMOTION-003"
        severity: "blocking"
        check: "正负结果均可追溯，没有只保留成功路径"
        evidence:
          - "artifact_catalog.md"
          - "retry_record.*"
          - "failure summary"
      - id: "PROMOTION-004"
        severity: "blocking"
        check: "若上游触发异常收益复核，复核结论与证据链已可追溯"
        evidence:
          - "backtest_gate_decision.md"
          - "final_research_conclusion.md"
      - id: "PROMOTION-005"
        severity: "reservation"
        check: "primary line 与 child lineage 的角色边界已写清"
        evidence:
          - "final_research_conclusion.md"
          - "lineage_relation.md"

  shadow_admission:
    stage_name: "Shadow Admission"
    recommended_gate_doc: "shadow_gate_decision.md"
    checks:
      - id: "SHADOW-001"
        severity: "blocking"
        check: "双引擎回测一致性已完成复核"
        evidence:
          - "engine_compare.csv"
          - "shadow_gate_decision.md"
      - id: "SHADOW-002"
        severity: "blocking"
        check: "成本、容量、监控指标和回滚条件已冻结"
        evidence:
          - "shadow_gate_decision.md"
          - "frozen_spec.json"
      - id: "SHADOW-003"
        severity: "blocking"
        check: "shadow 期间异常处理规则已定义"
        evidence:
          - "shadow_gate_decision.md"
          - "ops_runbook.md"
      - id: "SHADOW-004"
        severity: "reservation"
        check: "shadow admission 前已明确进入 shadow 的 primary / backup 方案"
        evidence:
          - "shadow_gate_decision.md"

  canary_production:
    stage_name: "Canary / Production"
    recommended_gate_doc: "canary_prod_gate_decision.md"
    checks:
      - id: "CANARY-001"
        severity: "blocking"
        check: "研究侧已明确自己交付的边界，不越权替代投产审批"
        evidence:
          - "canary_prod_gate_decision.md"
      - id: "CANARY-002"
        severity: "blocking"
        check: "监控、回滚、风控和生产责任边界明确"
        evidence:
          - "canary_prod_gate_decision.md"
          - "ops_runbook.md"
      - id: "CANARY-003"
        severity: "reservation"
        check: "研究阶段遗留风险已显式交接给生产治理层"
        evidence:
          - "canary_prod_gate_decision.md"
          - "handoff note"

verdict_guidance:
  pass:
    requires_all_blocking_checks: true
    allows_reservations: false
    note: "所有 blocking 检查通过，且无未解决 reservations"
  conditional_pass:
    requires_all_blocking_checks: true
    allows_reservations: true
    note: "blocking 检查全部通过，但存在非阻断 reservations，必须写入 residual_risks"
  pass_for_retry:
    requires_all_blocking_checks: false
    allows_reservations: true
    note: "当前阶段不能直接晋级，但存在清晰的 rollback 与受控 retry 路径"
  retry:
    requires_all_blocking_checks: false
    allows_reservations: true
    note: "当前阶段未通过，但仍属于原谱系可修复问题"
  no_go:
    requires_all_blocking_checks: false
    allows_reservations: false
    note: "当前阶段已足以支持终止原线"
  child_lineage:
    requires_all_blocking_checks: false
    allows_reservations: false
