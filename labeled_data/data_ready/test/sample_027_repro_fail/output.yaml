correct_class: REPRO_FAIL
severity: FAIL-HARD
classification_rationale: |
  For microsecond-level arbitrage research, exact data reproduction is
  critical because the entire strategy depends on sub-second price
  differences. The researcher admits both data sources are non-reproducible:
  websocket data depends on network conditions, REST polling has timing
  jitter. Setting random seeds in downstream analysis doesn't help when
  the input data itself is non-deterministic. For 100ms tick data, even
  millisecond-level timing differences can change whether an arbitrage
  opportunity appears to exist. FAIL-HARD because the research conclusion
  (whether arbitrage is feasible at this timescale) directly depends on
  data that cannot be reproduced.
reviewer_should_ask: "Is there an exchange-provided historical tick dataset with guaranteed ordering? Can the analysis be done at a coarser granularity where reproducibility is achievable?"
should_not_confuse: [DATA_MISALIGNMENT]
confusion_note: "The timing jitter could be seen as DATA_MISALIGNMENT, but the root cause is non-deterministic data collection (REPRO_FAIL). If the data were deterministic but misaligned, that would be DATA_MISALIGNMENT."
