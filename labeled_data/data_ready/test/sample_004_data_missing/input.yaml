research_idea: "跨交易所 BTC 价差套利信号衰减"
mandate_snapshot:
  research_question: "主要交易所间的 BTC 价差在 2023 年后是否因做市商竞争而系统性收窄"
  universe: "BTC on Binance, Coinbase, Kraken, OKX"
  time_window: "2021-01-01 to 2024-12-31"
  frequency: "1s snapshots aggregated to 1m"
  main_leg: "BTC"
  required_fields:
    - btc_close (1m per exchange)
    - bid_ask_spread (1m per exchange)
    - volume (1m per exchange)
    - withdrawal_fee, deposit_fee (per exchange)
data_spec_attempt: |
  ## Dataset Manifest
  - btc_close: Binance ✓, Coinbase ✓, Kraken ✓, OKX 2022-06-01 to 2024-12-31 ⚠️
  - bid_ask_spread: Binance ✓, Coinbase ✓, Kraken ✓, OKX ✓
  - volume: Binance ✓, Coinbase ✓, Kraken ✓, OKX ✓
  - withdrawal_fee: MISSING — fee schedule changes are not available as time series.
    Only current fee schedule available.
  - deposit_fee: MISSING — same reason

  Note: OKX has 18-month gap at start. Fee data not available as time series.
  Proceeding with price + spread + volume data.
lineage_context:
  idea_intake_output_summary: "Research requires fee data to compute all-in cost of cross-exchange arbitrage. Without fees, spread signals may be misleading."
  mandate_freeze_hash: "md5:m3n4o5p6"
