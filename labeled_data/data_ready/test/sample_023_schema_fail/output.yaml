correct_class: SCHEMA_FAIL
severity: FAIL-SOFT
classification_rationale: |
  The field documentation says etf_net_flow is "in USD millions" but the
  actual data uses "USD" (not millions). The 3-order-of-magnitude difference
  means any model using the raw flow values would be incorrectly scaled.
  Additionally, btc_equivalent = usd_flow / btc_close_same_day introduces
  a subtle issue: the ETF flow data is typically reported at market close,
  and dividing by same-day BTC close creates a circular dependency in any
  same-day impact analysis (the denominator already reflects the flow's
  impact). The correct conversion should use previous-day close. FAIL-SOFT
  on the unit documentation mismatch; the circular dependency issue is an
  additional concern but secondary.
reviewer_should_ask: "Is the flow in USD or USD millions? Was the conversion to BTC using same-day or previous-day close?"
should_not_confuse: [DATA_MISALIGNMENT]
confusion_note: "The circular dependency issue (same-day close) could be confused with DATA_MISALIGNMENT, but the primary failure is the unit documentation mismatch (SCHEMA_FAIL)."
