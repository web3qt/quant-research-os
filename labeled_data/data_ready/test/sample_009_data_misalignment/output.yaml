correct_class: DATA_MISALIGNMENT
severity: FAIL-SOFT
classification_rationale: |
  The funding rate at 00:00 UTC reflects the rate for the 8h window ENDING
  at 00:00 (i.e., 16:00-00:00), but the spot return is computed from
  00:00 to 08:00 (the NEXT 8h window). This means the funding rate and
  return are not aligned to the same time period — the funding rate is
  retrospective while the return is prospective. For a study testing whether
  funding rate predicts future returns, this misalignment is critical because
  it tests a different hypothesis than intended. FAIL-SOFT because the
  misalignment can be corrected by lagging the funding rate or aligning both
  to the same window.
reviewer_should_ask: "Has the funding rate been properly lagged to align with the return window? What is the actual hypothesis being tested with the current alignment?"
should_not_confuse: [LEAKAGE_FAIL]
confusion_note: "This is tricky — it looks like temporal contamination but is actually misalignment. LEAKAGE_FAIL requires FUTURE information in the training set. Here the issue is that the two series cover different time windows within the same observation."
