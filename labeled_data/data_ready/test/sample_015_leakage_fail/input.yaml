research_idea: "BTC 洗盘检测 — 成交量异常与价格反转"
mandate_snapshot:
  research_question: "异常成交量 spike 后 BTC 价格反转的概率是否显著高于随机"
  universe: "BTC"
  time_window: "2020-01-01 to 2024-12-31"
  frequency: "1h bars"
  main_leg: "BTC"
data_spec_attempt: |
  ## Dataset Manifest
  - btc_1h_bars: ✓
  - volume_zscore: (volume - rolling_mean_168h) / rolling_std_168h
    (168h = 1 week)
  - volume_spike: binary when volume_zscore > 3.0
  - Label: max_drawdown and max_recovery in next 24h after spike
  - Train/test: 2020-2022 / 2023-2024
  - Preprocessing:
    - Volume data cleaned: replaced 0-volume bars with volume from
      nearest non-zero bar (avoids division by zero in z-score)
    - Rolling window: expanded backward for first 168h to include
      all available data
lineage_context:
  idea_intake_output_summary: "Zero-volume bars must be marked explicitly, not silently replaced."
  mandate_freeze_hash: "md5:k1l2m3n4"
