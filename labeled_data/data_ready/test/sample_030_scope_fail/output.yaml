correct_class: SCOPE_FAIL
severity: FAIL-SOFT
classification_rationale: |
  TWO scope violations:
  1. Added DAI and FRAX stablecoins — mandate specifies "USDT and USDC only"
  2. Added CEX deposit/withdrawal data — mandate says "No derivatives data."
     While CEX flows aren't technically derivatives, they represent a different
     data category not in the mandate.
  The researcher's rationale (better coverage, disambiguation) is reasonable
  from a research perspective but violates the frozen mandate. The correct
  path is to either: (a) proceed with USDT/USDC only and note DAI/FRAX as
  future work, or (b) open a child lineage with an amended mandate that
  includes broader stablecoin coverage and CEX flow context. FAIL-SOFT
  because the core USDT/USDC data is present and the additions are
  supplementary, not replacement.
reviewer_should_ask: "Does the CEX flow data materially change conclusions compared to USDT/USDC-only analysis? Is this worth a child lineage?"
should_not_confuse: [DATA_MISSING]
confusion_note: "Adding extra data sources is SCOPE_FAIL (expanded beyond mandate), not DATA_MISSING (mandated data is present). The mandated data exists — the issue is that extra data was added."
