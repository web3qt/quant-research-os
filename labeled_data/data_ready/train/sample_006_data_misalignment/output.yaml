correct_class: DATA_MISALIGNMENT
severity: FAIL-SOFT
classification_rationale: |
  BTC closes at 00:00 UTC (Coinbase) while ETH closes at 23:59 UTC (Binance).
  The 1-minute difference is used across exchanges, creating a subtle
  cross-exchange session boundary mismatch. While the researcher claims this
  is "negligible for daily signals," the mandate requires identical daily
  bar definition. For pair analysis, even a 1-minute mismatch means the
  ratio uses BTC price at T and ETH price at T-1min, which can differ
  significantly during volatile periods (flash crashes, liquidation cascades).
  FAIL-SOFT because the impact is limited but the principle violation is real.
reviewer_should_ask: "Was the 1-minute mismatch validated against high-volatility periods? Can both legs be sourced from the same exchange?"
should_not_confuse: [SCHEMA_FAIL]
confusion_note: "Schema is correct (daily close), but the temporal definition differs. This is alignment, not schema."
