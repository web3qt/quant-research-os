correct_class: REPRO_FAIL
severity: FAIL-SOFT
classification_rationale: |
  Two reproducibility issues:
  1. random_state not set globally — different runs of the same pipeline
     produce different train/test splits, making results non-reproducible.
  2. Data source updated between March and April re-runs (implicit — the
     API version stayed "v3" but upstream data was restated). The researcher
     didn't pin the data snapshot to a specific API response or file hash.
  Both violate the mandate's reproducibility requirement. FAIL-SOFT because
  the base data (btc_daily_close) is deterministic from Binance API, but the
  downstream processing introduces non-determinism.
reviewer_should_ask: "Can all random seeds be fixed in a central config? Can the data snapshot be pinned to a specific download date and file hash?"
should_not_confuse: [QUALITY_FAIL]
confusion_note: "Random seed issues affect reproducibility (REPRO_FAIL), not data quality (QUALITY_FAIL). The data values are fine — the problem is that different runs produce different splits."
