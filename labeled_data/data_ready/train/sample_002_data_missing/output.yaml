correct_class: DATA_MISSING
severity: FAIL-SOFT
classification_rationale: |
  The mandate requires defi_tvl_by_protocol (top 20) for protocol-specific
  signal decomposition, but this field is completely unavailable due to API
  inconsistencies. The researcher silently dropped this field and proceeded
  with aggregate TVL only. This is DATA_MISSING because a mandated required
  field was not delivered. Severity is FAIL-SOFT because total TVL is
  available and could support a narrower version of the research question,
  but the protocol-specific decomposition promised in the mandate cannot be
  done. If the mandate is adjusted to use only aggregate TVL, this becomes
  SCOPE_FAIL (research scope changed).
reviewer_should_ask: "Can the research question be answered with aggregate TVL only, or is protocol-level granularity essential?"
should_not_confuse: [SCOPE_FAIL]
confusion_note: "If the mandate had never required protocol-level data, this would not be a failure. The failure is that a declared required field is missing."
