correct_class: DATA_MISALIGNMENT
severity: FAIL-SOFT
classification_rationale: |
  BTC 1h bars are synthetic (aggregated from 1m) while ALT 1h bars are native
  exchange candles. The aggregation method for BTC (VWAP-weighted from first
  60 1m bars) and the exchange's native 1h candle construction may differ —
  exchanges typically use the first trade after the hour boundary as open,
  last trade before next hour as close, and volume-weighted VWAP for the full
  hour. The claim "these should be equivalent" is an unverified assumption.
  For volatility analysis, even small OHLCV differences compound through
  realized vol computation. FAIL-SOFT because the boundary definition is
  consistent (open_time), but the aggregation methodology differs.
reviewer_should_ask: "Has the synthetic 1h aggregation been validated against native 1h BTC candles from the same exchange?"
should_not_confuse: [REPRO_FAIL]
confusion_note: "REPRO_FAIL would apply if re-running the same pipeline gives different results. Here the issue is cross-asset alignment, not reproducibility."
