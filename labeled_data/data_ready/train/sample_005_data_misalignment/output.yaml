correct_class: DATA_MISALIGNMENT
severity: FAIL-HARD
classification_rationale: |
  The review skill explicitly states "混用 open_time 和 close_time 作为主键"
  as a must-fail-none condition. The data spec admits to using close_time for
  ALTs and applying a -1min offset to approximate open_time alignment. This is
  DATA_MISALIGNMENT because the time alignment is incorrect — the offset
  approximation does not account for bar boundary differences, and the
  mandate explicitly requires open_time as primary key. The -1min shift is
  a heuristic that introduces systematic misalignment, especially around
  bar boundaries where the actual offset may not be exactly 60 seconds.
reviewer_should_ask: "Can ALT data be re-fetched from a source that provides open_time? Is the -1min offset documented with validation against known-aligned periods?"
should_not_confuse: [SCHEMA_FAIL]
confusion_note: "This is not SCHEMA_FAIL because the timestamp field exists — it's the VALUE of the timestamp that's wrong (shifted by a heuristic). SCHEMA_FAIL would be if the field was named differently or had wrong type."
