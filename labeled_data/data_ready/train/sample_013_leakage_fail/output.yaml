correct_class: LEAKAGE_FAIL
severity: FAIL-HARD
classification_rationale: |
  The researcher used "final restated values" for bridge flow data, meaning
  they used the corrected data that bridges publish days after the initial
  report. In a real-time prediction setting, the initial (potentially incorrect)
  flow data would be the only information available. Using restated data
  introduces future information because the corrections incorporate events
  that happened after the prediction timestamp. This is equivalent to using
  revised economic data (like GDP revisions) in real-time prediction — a
  well-known source of leakage. FAIL-HARD per triage rule: "使用未来已知
  信息过滤样本".
reviewer_should_ask: "What percentage of bridge flow records were restated? Is there a versioned API that provides point-in-time flow data?"
should_not_confuse: [REPRO_FAIL]
confusion_note: "Using restated vs initial data is a reproducibility concern, but the primary issue here is temporal contamination (LEAKAGE), not reproducibility. If both restated and initial data produce the same result, REPRO_FAIL wouldn't apply."
