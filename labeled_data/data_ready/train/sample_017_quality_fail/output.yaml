correct_class: QUALITY_FAIL
severity: FAIL-SOFT
classification_rationale: |
  CRV has 4.2% missing and 15 stale bars, SNX has 3.4% missing and 12 stale bars.
  For cointegration analysis, data quality is critical because the test is
  sensitive to missing observations and forward-filled values can create
  spurious cointegration. The researcher's claim that these rates are "within
  acceptable range" is not supported by any explicit threshold. Forward-filling
  stale bars across multiple symbols creates artificial synchronicity in the
  time series, which is exactly what cointegration tests detect. FAIL-SOFT
  because the researcher should either exclude these symbols or explicitly
  document the impact. Note: if forward-fill created artificial cross-symbol
  correlation that drives the cointegration result, this could also be
  LEAKAGE_FAIL, but the primary issue is data quality degradation.
reviewer_should_ask: "What is the defined 'acceptable range' for missing rates? Are the cointegration results driven by the forward-filled periods?"
should_not_confuse: [DATA_MISSING]
confusion_note: "Data exists but is degraded — this is QUALITY_FAIL, not DATA_MISSING. DATA_MISSING would apply if CRV/SNX data was completely unavailable."
