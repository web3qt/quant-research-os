correct_class: REPRO_FAIL
severity: FAIL-SOFT
classification_rationale: |
  Dune Analytics query results vary between runs (0.01-0.5%) due to blockchain
  reorgs. While the researcher acknowledges this, they haven't implemented
  a mechanism to ensure reproducibility: either (1) pin to a specific block
  height for each calendar day, or (2) snapshot the query results at a
  specific timestamp and use the snapshot as the canonical data source.
  The 169 tx difference is small but non-zero, and for a research question
  about leading relationships, even small differences in the lagged variable
  can affect statistical significance. FAIL-SOFT because the magnitude is
  tiny and unlikely to change conclusions, but the principle of deterministic
  reproducibility is violated.
reviewer_should_ask: "Can the Dune query be pinned to specific block heights? Is there a way to snapshot the results at a fixed timestamp?"
should_not_confuse: [QUALITY_FAIL]
confusion_note: "The data variance from reorgs is a reproducibility issue (REPRO_FAIL), not a quality issue (QUALITY_FAIL). The data isn't degraded — it's just not deterministic."
