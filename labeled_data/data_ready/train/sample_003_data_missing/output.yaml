correct_class: DATA_MISSING
severity: FAIL-HARD
classification_rationale: |
  Two data issues: (1) miner_address_count completely unavailable — this is
  needed for flow normalization per mandate's research design. (2) miner_net_flow
  truncates at 2024-06-30, leaving the mandate's 2024-07-01 to 2024-12-31
  window uncovered. Both are DATA_MISSING. The truncation also introduces a
  temporal coverage gap that may affect conclusions about the 2024 halving
  event. FAIL-HARD because both items are core to the research question.
reviewer_should_ask: "Can an alternative data source provide miner_address_count? Should the time window be adjusted to 2020-01-01 to 2024-06-30?"
should_not_confuse: [SCOPE_FAIL, QUALITY_FAIL]
confusion_note: "This is not SCOPE_FAIL because the researcher didn't change the scope — the data simply isn't there. It's not QUALITY_FAIL because the problem is absence, not degradation."
