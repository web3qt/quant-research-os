correct_class: DATA_MISALIGNMENT
severity: FAIL-HARD
classification_rationale: |
  The on-chain weekly data uses Monday 00:00 UTC boundary (Glassnode standard),
  while the price data uses Sunday 00:00 UTC. The researcher applied a "1-day
  forward shift" to align, but this is incorrect because: (1) a shift changes
  the data composition — the Monday-start week includes Sunday data, while
  Sunday-start week includes Saturday data, so the shifted on-chain week now
  contains different underlying daily values; (2) for a lead-lag analysis
  claiming 1-4 week prediction, a 1-day boundary error is within the signal
  window and could create spurious lead-lag patterns. FAIL-HARD because the
  lead-lag conclusion is directly compromised.
reviewer_should_ask: "Can both price and on-chain data be re-aggregated to the same week boundary? What happens to the lead-lag signal if the boundary error is corrected?"
should_not_confuse: [LEAKAGE_FAIL]
confusion_note: "Not LEAKAGE_FAIL because no future information is used. The problem is temporal boundary inconsistency, not temporal contamination."
