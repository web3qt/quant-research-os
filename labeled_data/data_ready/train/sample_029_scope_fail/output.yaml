correct_class: SCOPE_FAIL
severity: FAIL-SOFT
classification_rationale: |
  TWO scope violations:
  1. Added ETH as comparison — mandate specifies BTC only. Adding ETH
     changes the research from "BTC halving analysis" to "comparative
     halving analysis across assets."
  2. Added miner_reserve, exchange_reserve, geographic hashrate — mandate
     says "Focus on hash_rate and price only."
  The time window extension to 2012 is borderline — the mandate says
  "covering 3 halving events" which would naturally start from 2012 (first
  halving was 2012), so this may be an interpretation issue rather than
  a scope violation. FAIL-SOFT because the added data sources could be
  justified as enrichment, but they weren't in the mandate contract.
reviewer_should_ask: "Does the mandate's '3 halving events' requirement implicitly include 2012? Should the mandate be amended to include the additional data sources?"
should_not_confuse: [DATA_MISALIGNMENT]
confusion_note: "Adding a comparison asset (ETH) is SCOPE_FAIL (changed research scope), not DATA_MISALIGNMENT (which would be about time alignment issues)."
