research_idea: "BTC-ETH 配对交易 — beta 中性策略"
mandate_snapshot:
  research_question: "BTC-ETH beta 中性组合是否能产生稳定的 alpha"
  universe: "BTC + ETH"
  time_window: "2020-01-01 to 2024-12-31"
  frequency: "daily"
  main_leg: "BTC"
  required_fields:
