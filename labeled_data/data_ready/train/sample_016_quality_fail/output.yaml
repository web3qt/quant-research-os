correct_class: QUALITY_FAIL
severity: FAIL-SOFT
classification_rationale: |
  12 stale bars concentrated in COVID crash and China mining ban are NOT
  just data quality issues — they represent periods of extreme market stress
  that are恰恰 the target of the research question (mean reversion during
  volatile periods). Forward-filling these bars would create fake "calm"
  data points during crises, biasing the z-score signal toward appearing
  predictive during high-volatility events. The stale bars in these
  specific periods should be explicitly excluded or flagged rather than
  filled. FAIL-SOFT because the issue affects ~2.6% of data but is
  concentrated in the most analytically important periods.
reviewer_should_ask: "What is the z-score signal behavior if COVID and China ban periods are excluded? Does the forward-fill create artificial mean-reversion patterns?"
should_not_confuse: [LEAKAGE_FAIL, DATA_MISALIGNMENT]
confusion_note: "Forward-fill during crisis periods could be seen as introducing fake calm data (resembling LEAKAGE), but the issue is fundamentally about data quality during extreme events. The forward-fill doesn't use future data — it uses past data. The problem is that the past data is not representative of the crisis period."
